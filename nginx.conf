server {
    listen 80;
    server_name localhost;

    # Directorio raíz donde Nginx buscará los archivos estáticos
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Compresión Gzip para optimizar velocidad de carga
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    location / {
        # Intenta servir el archivo solicitado, luego el directorio,
        # y si no existe, redirige a index.html para que el router de la SPA se encargue
        try_files $uri $uri/ /index.html;
    }

    # Caché estricto para assets (JS, CSS, imágenes) generados por Vite (tienen hashes únicos)
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff|woff2)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, no-transform";
    }

    # Evitar caché para el index.html para que los usuarios siempre obtengan la última versión
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
